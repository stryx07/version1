name: flutter_app_acade
description: "Attendance System — QR Code based attendance management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Navigation
  go_router: ^14.3.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
